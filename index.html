<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --yellow: #C9A84C; --yellow-light: #E2C06A;
  --yellow-bg: rgba(201,168,76,0.08);
  --bg: #ffffff; --border: #e0e0e0; --border-strong: #c5c5c5;
  --text: #1a1a1a; --muted: #888888; --red: #e05252;
}
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* HEADER */
header { padding: 18px 20px 6px; display: flex; align-items: center; justify-content: space-between; }
.logo-wrap { display: flex; flex-direction: column; }
.logo-title { display: flex; align-items: center; gap: 8px; }
.logo-icon { font-size: 22px; }
.logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--yellow); letter-spacing: 2px; line-height: 1; white-space: nowrap; }
.logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hbtn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid var(--border-strong); background: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; margin-left: 12px; }
.hbtn:hover { border-color: var(--yellow); background: var(--yellow-bg); }

.divider { height: 2px; background: linear-gradient(to right, var(--yellow), var(--yellow-light), transparent); margin: 10px 0 20px; }

/* INPUT */
.section { padding: 0 16px; margin-bottom: 16px; }
.field-label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--yellow); margin-bottom: 8px; }
.input-row { display: flex; align-items: center; gap: 10px; }
.field-input { flex: 1; padding: 16px 18px; border: 2px solid var(--border); border-radius: 14px; background: #fafafa; font-family: 'Barlow', sans-serif; font-size: 18px; font-weight: 600; color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.field-input::placeholder { color: #ccc; font-weight: 400; }
.field-input:focus { border-color: var(--yellow); background: #fff; }
.btn-clear { width: 52px; height: 52px; border-radius: 14px; border: 2px solid #f0dede; background: #fff5f5; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.btn-clear:hover { border-color: var(--red); background: #ffe8e8; }

/* RESULT CARD */
.result-card { margin: 0 16px 16px; border: 2px solid var(--yellow); border-radius: 16px; overflow: hidden; }
.rc-valor-row { background: #fffdf5; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.rv-left { display: flex; align-items: center; gap: 8px; }
.rv-icon { font-size: 18px; }
.rv-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.rv-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--yellow); letter-spacing: 1px; }
.rc-disp-badge { background: var(--yellow); color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

/* TABELA */
.rc-table { width: 100%; border-collapse: collapse; }
.rc-table thead tr { background: #f5f5f5; }
.rc-table thead th { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--yellow); padding: 9px 14px; text-align: left; border-bottom: 1px solid var(--border); }
.rc-table thead th:not(:first-child) { text-align: right; }
.rc-table tbody tr { border-bottom: 1px solid #f0f0f0; }
.rc-table tbody tr:last-child { border-bottom: none; }
.rc-table tbody tr:hover { background: #fffdf5; }
.rc-table tbody td { padding: 10px 14px; font-size: 13px; }
.rc-table tbody td:not(:first-child) { text-align: right; }
.td-parc { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--yellow); }
.td-vparcela { color: var(--muted); font-weight: 600; }
.td-total { font-weight: 700; color: var(--text); }
.td-juros { font-size: 12px; color: var(--red); font-weight: 600; }

.rc-footer { background: #fffdf5; border-top: 1px solid var(--border); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
.rf-left { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text); }
.rf-right { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--yellow); }

/* BOTÃO COPIAR */
.action-btns { padding: 0 16px; margin-bottom: 32px; }
.abtn { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--yellow); background: var(--yellow); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.15s; }
.abtn:hover { background: var(--yellow-light); border-color: var(--yellow-light); }
.abtn:active { transform: scale(0.98); }

/* TOAST */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 9999; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-title">
      <span class="logo-icon">💳</span>
      <span class="logo-text">SIMULAÇÃO EMPRÉSTIMO</span>
    </div>
    <div class="logo-sub">Digite o valor e copie para o WhatsApp</div>
  </div>
  <button class="hbtn" onclick="copiarWhats()" title="Copiar para WhatsApp">📋</button>
</header>

<div class="divider"></div>

<div class="section">
  <div class="field-label">💰 Valor que o cliente quer receber (R$)</div>
  <div class="input-row">
    <input class="field-input" id="valorInput" type="number" placeholder="1000" min="1" step="1" oninput="calcular()">
    <button class="btn-clear" onclick="limpar()" title="Limpar">🗑️</button>
  </div>
</div>

<div id="resultArea"></div>

<div class="action-btns" id="actionBtns" style="display:none">
  <button class="abtn" onclick="copiarWhats()">📋 &nbsp;COPIAR PARA WHATSAPP</button>
</div>

<div class="toast" id="toast">✅ Texto copiado!</div>

<script>
const FATORES = {
   1: 0.92358333,
   2: 0.46591667,
   3: 0.31276667,
   4: 0.23619167,
   5: 0.19026667,
   6: 0.15964167,
   7: 0.13807500,
   8: 0.12164167,
   9: 0.10886667,
  10: 0.09865000,
  11: 0.09029167,
  12: 0.08333333,
  13: 0.07815833,
  14: 0.07307500,
  15: 0.06866667,
  16: 0.06481667,
  17: 0.06141667,
  18: 0.05840833,
};

const fmt = v => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
let valAtual = 0;

function calcular() {
  const val = parseFloat(document.getElementById('valorInput').value) || 0;
  valAtual = val;
  const area = document.getElementById('resultArea');
  const btns = document.getElementById('actionBtns');

  if (!val || val <= 0) {
    area.innerHTML = '';
    btns.style.display = 'none';
    return;
  }

  const cobrado = val * 1.20;
  let rows = '';
  for (let n = 1; n <= 18; n++) {
    const parcela = cobrado * FATORES[n];
    const total   = parcela * n;
    const juros   = total - val;
    rows += '<tr>' +
      '<td class="td-parc">' + n + 'x</td>' +
      '<td class="td-vparcela">R$ ' + fmt(parcela) + '</td>' +
      '<td class="td-total">R$ ' + fmt(total) + '</td>' +
      '<td class="td-juros">+R$ ' + fmt(juros) + '</td>' +
      '</tr>';
  }

  area.innerHTML =
    '<div class="result-card">' +
      '<div class="rc-valor-row">' +
        '<div class="rv-left">' +
          '<span class="rv-icon">💳</span>' +
          '<div>' +
            '<div class="rv-label">Parcelando</div>' +
            '<div class="rv-val">R$ ' + fmt(val) + '</div>' +
          '</div>' +
        '</div>' +
        '<span class="rc-disp-badge">18X DISPONÍVEL</span>' +
      '</div>' +
      '<table class="rc-table">' +
        '<thead><tr>' +
          '<th>Parc.</th><th>Valor/Parc.</th><th>Total</th><th>Juros</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
      '<div class="rc-footer">' +
        '<span class="rf-left">📲 Fale para fechar negócio</span>' +
        '<span class="rf-right">🏆 Melhor taxa</span>' +
      '</div>' +
    '</div>';

  btns.style.display = 'block';
}

function gerarTexto() {
  if (!valAtual) return '';
  const cobrado = valAtual * 1.20;
  const linhas = [];
  for (let n = 1; n <= 18; n++) {
    const p = cobrado * FATORES[n];
    const total = p * n;
    linhas.push({ n: n, p: fmt(p), total: fmt(total) });
  }
  const maxP     = Math.max.apply(null, linhas.map(function(l){ return l.p.length; }));
  const maxTotal = Math.max.apply(null, linhas.map(function(l){ return l.total.length; }));

  var t = '*\u{1F4B3} SIMULAÇÃO DE EMPRÉSTIMO*\n\n';
  t += '*\u{1F4B5} Valor recebido: R$ ' + fmt(valAtual) + '*\n\n';
  t += '```\n';
  t += 'Px.  ' + 'Parcela'.padStart(maxP) + '  ' + 'Total'.padStart(maxTotal) + '\n';
  t += '\u2500'.repeat(5 + maxP + 2 + maxTotal) + '\n';
  for (var i = 0; i < linhas.length; i++) {
    var l = linhas[i];
    t += String(l.n).padStart(2,'0') + 'x   ' + l.p.padStart(maxP) + '  \u2502  ' + l.total.padStart(maxTotal) + '\n';
  }
  t += '```';
  return t;
}

function mostrarToast() {
  var el = document.getElementById('toast');
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

function copiarWhats() {
  var txt = gerarTexto();
  if (!txt) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function(){ mostrarToast(); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    mostrarToast();
  }
}

function limpar() {
  document.getElementById('valorInput').value = '';
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('actionBtns').style.display = 'none';
  valAtual = 0;
}
</script>
</body>
</html>
